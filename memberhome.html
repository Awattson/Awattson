    <!--ログイン機能-->
    <script type="text/javascript">
      function first(){
        var user = prompt("あなたの名前をご記入ください。");
        if(user==false || user==null){
          alert("名前を記入しない限り入れません。どうぞお帰り下さい。");
          first();
        }else{
          document.title=user;
        }
        var  pass=prompt("いらっしゃい"+user+"さん。パスワードを入力してください。");
        var passWord="合言葉は消えちゃいました。πドゥアイ"
        if(pass == passWord){
          alent("you have passed");
        }else{
          alert("パスワードが違います。初期位置に転送します。");
          first();
        }
      }
      window.onload=first();
    </script>
